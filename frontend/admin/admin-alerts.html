<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/images/tab-logo-icon.ico">
    <title>Alert Management - Aqua Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../assets/css/admin/admin-shared.css">
    <link rel="stylesheet" href="../assets/css/admin/admin-sidebar.css">
    <link rel="stylesheet" href="../assets/css/admin/admin-alerts.css">

    <script defer src="../assets/js/shared/api.js"></script>
    <script defer src="../assets/js/shared/action-guidance.js"></script>
    <script defer src="../assets/js/admin/admin-alerts.js"></script>
    <script defer src="../assets/js/admin/admin-shared.js"></script>
</head>
<body>

<div id="sidebarMount"></div>

<!-- SIDEBAR OVERLAY -->
<div class="sidebar-overlay"></div>

<!-- MAIN CONTENT -->
<main class="main-content">

    <!-- TOP HEADER -->
    <div class="top-header">
        <button class="hamburger-btn" id="sidebarToggle" aria-label="Toggle sidebar">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="header-left">
            <div class="header-titles">
                <h1 class="header-title">Alert Management</h1>
                <p class="header-sub">Monitor and manage system alerts</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-ghost" id="alertsFilterBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                <span>Filter</span>
            </button>
            <button class="btn btn-primary" id="alertsExportBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>Export</span>
            </button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar-wrap">
        <div class="search-input-wrap">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="searchInput" placeholder="Search alerts by title, message, or fountain...">
        </div>
    </div>

    <!-- PAGE BODY -->
    <div class="page-body">

        <!-- STAT CARDS -->
        <div class="stat-grid">
            <div class="stat-card teal">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
                <div class="stat-label">Active Alerts</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Requires attention</div>
            </div>
            <div class="stat-card red">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                </div>
                <div class="stat-label">Critical Alerts</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Immediate action needed</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <div class="stat-label">Warnings</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Monitor closely</div>
            </div>
        </div>

        <!-- FILTER TABS -->
        <div class="filter-tabs" id="filterTabs">
            <button class="tab-btn active" data-filter="all">All Alerts</button>
            <button class="tab-btn" data-filter="active">Active</button>
            <button class="tab-btn" data-filter="critical">Critical</button>
            <button class="tab-btn" data-filter="warning">Warnings</button>
            <button class="tab-btn" data-filter="safe">Safe</button>
            <button class="tab-btn" data-filter="resolved">Resolved</button>
        </div>

        <div class="alerts-summary" id="alertsActionSummary"></div>

        <!-- ALERT CARDS -->
        <div class="alerts-list" id="alertsList">
            <!-- Injected by JS -->
        </div>
    </div><!-- /page-body -->
</main>
</body>
</html>
