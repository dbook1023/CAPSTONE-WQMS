<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/images/tab-logo-icon.ico">
    <title>Fountain Status - Aqua Monitor</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Shared Styles -->
    <link rel="stylesheet" href="../assets/css/user/user-shared.css">
    <link rel="stylesheet" href="../assets/css/user/user-sidebar.css">
    
    <!-- Scripts -->
    <script defer src="../assets/js/shared/api.js"></script>
    <script defer src="../assets/js/user/user-shared.js"></script>
    <script defer src="../assets/js/user/user-fountain-status.js"></script>
</head>
<body>

<div id="sidebarMount"></div>
<div class="sidebar-overlay"></div>

<main class="main-content">
    <div class="top-header">
        <button class="hamburger-btn" id="sidebarToggle" aria-label="Toggle sidebar">
            <span></span><span></span><span></span>
        </button>
        <div class="header-left">
            <div class="header-titles">
                <h1 class="header-title">Fountain Status</h1>
                <p class="header-sub">Detailed overview of all OLFU campus water units</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn btn-primary" onclick="window.print()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                <span>Print Status</span>
            </button>
        </div>
    </div>

    <div class="page-body">
        <div class="stat-grid" style="margin-bottom: 24px;">
            <div class="stat-card glass-card">
                <div class="stat-card-top">
                    <div class="stat-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M2 12h20"/></svg>
                    </div>
                </div>
                <div class="stat-label">Total Units</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Across all buildings</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-card-top">
                    <div class="stat-icon" style="background: rgba(20, 184, 166, 0.1);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#14B8A6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div class="stat-badge">Healthy</div>
                </div>
                <div class="stat-label">Avg. pH Level</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Optimal range (6.5 - 8.5)</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-card-top">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1);">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                </div>
                <div class="stat-label">Units Needing Service</div>
                <div class="stat-value">--</div>
                <div class="stat-sub">Scheduled for next week</div>
            </div>
        </div>

        <div class="glass-card" style="overflow: hidden;">
            <div style="overflow-x: auto;">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Fountain Name</th>
                            <th>Location</th>
                            <th>Current pH</th>
                            <th>Status</th>
                            <th>Last Service</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Injected by JS -->
                    </tbody>
                </table>
            </div>
            
            <!-- TABLE FOOTER -->
            <div class="table-footer">
                <div class="table-info">
                    Showing <span>1</span> to <span>4</span> of <span>4</span> units
                </div>
                <div class="pagination">
                    <button class="pg-btn disabled">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                    </button>
                    <button class="pg-btn active">1</button>
                    <button class="pg-btn disabled">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</main>

</body>
</html>
